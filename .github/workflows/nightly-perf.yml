name: Nightly Perf

on:
  schedule:
    - cron: '0 9 * * *'   # 09:00 UTC daily
  workflow_dispatch:

jobs:
  lighthouse-prod:
    name: Lighthouse against production
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Lighthouse against prod
        run: |
          # Replace with the actual production URL via secret/env once set.
          PROD_URL="${{ secrets.PROD_URL || 'https://rajin.vercel.app' }}"
          npx -y lighthouse "$PROD_URL/login" \
            --output=json --output=html \
            --output-path=./lhr \
            --chrome-flags="--headless --no-sandbox" \
            --form-factor=mobile \
            --quiet || true
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: lighthouse-prod
          path: ./lhr*
          retention-days: 30

  open-issue-on-regression:
    needs: lighthouse-prod
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Open regression issue
        uses: actions/github-script@v7
        with:
          script: |
            const today = new Date().toISOString().split('T')[0];
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Nightly perf regression — ${today}`,
              body: `Nightly Lighthouse run on prod failed. See artifact: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}\n\nQueued in \`.claude/queue.md\` automatically — pick up via \`/loop-once\`.`,
              labels: ['perf', 'regression', 'automated']
            });
